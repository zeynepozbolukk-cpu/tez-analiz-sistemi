<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tez Analiz Sistemi – Final</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
:root{
  --bg:#f6f3ee; --card:#ffffff; --muted:#6b7280; --text:#111827; --line:#ddd7ce;
  --accent:#274c77; --accent2:#0f766e; --warn:#92400e; --soft:#f0ebe3;
}
*{box-sizing:border-box}
body{margin:0;font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text)}
header{background:#1f2937;color:#fff;padding:14px 18px;position:sticky;top:0;z-index:30}
header h1{margin:0;font-size:18px}
nav{display:flex;gap:8px;overflow:auto;padding:10px 14px;background:#fff;border-bottom:1px solid var(--line);position:sticky;top:50px;z-index:29}
nav button{border:none;background:#eef2f7;padding:8px 12px;border-radius:999px;cursor:pointer;font-size:12px;white-space:nowrap}
nav button.active{background:var(--accent);color:#fff}
main{max-width:1320px;margin:0 auto;padding:18px}
.tab{display:none}
.tab.active{display:block}
.grid{display:grid;gap:16px}
.g2{grid-template-columns:1.2fr 1fr}
.g22{grid-template-columns:1fr 1fr}
.g3{grid-template-columns:repeat(3,1fr)}
.g4{grid-template-columns:repeat(4,1fr)}
.card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:16px}
.card h2{margin:0 0 6px 0;font-size:20px}
.sub{margin:0 0 12px 0;color:var(--muted);font-size:12px}
label{display:block;font-size:12px;color:var(--muted);margin:8px 0 4px}
input,select,textarea{width:100%;padding:9px 10px;border:1px solid var(--line);border-radius:8px;background:#fff}
textarea{min-height:72px;resize:vertical}
.row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.btn{border:none;background:var(--accent);color:#fff;padding:10px 14px;border-radius:8px;cursor:pointer}
.btn.secondary{background:var(--accent2)}
.btn.ghost{background:#eef2f7;color:#111827}
.btn.warn{background:#b91c1c}
.stat{background:#fff;border:1px solid var(--line);border-radius:12px;padding:14px}
.stat .v{font-size:28px;font-weight:700}
.stat .k{font-size:12px;color:var(--muted)}
.table-wrap{overflow:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th,td{padding:10px;border-bottom:1px solid #eee8de;text-align:left;vertical-align:top}
th{background:#faf9f6;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}
.badge{display:inline-block;padding:5px 9px;border-radius:999px;background:#eef2f7;font-size:11px;margin:2px}
.badge.kw{background:#f5f0e8}
.notice{background:#fff7ed;border:1px solid #fed7aa;color:var(--warn);padding:10px 12px;border-radius:8px;font-size:12px}
.empty{padding:26px;text-align:center;color:var(--muted)}
.chartbox{position:relative;height:310px}
.chartbox.sm{height:230px}
.preview-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.preview{border:1px solid var(--line);border-radius:10px;background:#fff;padding:10px}
.preview h4{margin:0 0 8px 0;font-size:14px}
.img-frame{height:140px;background:var(--soft);border:1px solid #e6dfd4;border-radius:8px;display:flex;align-items:center;justify-content:center;padding:8px}
.img-frame img{max-width:100%;max-height:100%;object-fit:contain}
.kws{margin-top:8px}
.rubric-card{border:1px solid var(--line);border-radius:12px;padding:14px;background:#fff;margin-bottom:14px}
.rubric-head{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:10px}
.rubric-title{font-size:18px;font-weight:700}
.rubric-form{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;align-items:end;margin-top:12px}
.small{font-size:12px;color:var(--muted)}
.finding{background:#f8fbff;border-left:4px solid var(--accent);padding:12px 14px;border-radius:8px;margin-bottom:12px;line-height:1.7}
hr.sep{border:none;border-top:1px solid var(--line);margin:16px 0}
@media(max-width:1000px){.g2,.g22,.g3,.g4,.row,.row3,.preview-grid,.rubric-form{grid-template-columns:1fr}}
</style>
</head>
<body>
<header><h1>İç Mimarlık Tez Analiz Sistemi – Final</h1></header>
<nav id="tabs"></nav>
<main>
  <section id="tab-data" class="tab active"></section>
  <section id="tab-artworks" class="tab"></section>
  <section id="tab-tools" class="tab"></section>
  <section id="tab-vize" class="tab"></section>
  <section id="tab-final" class="tab"></section>
  <section id="tab-compare" class="tab"></section>
  <section id="tab-rubric" class="tab"></section>
  <section id="tab-findings" class="tab"></section>
</main>

<script>
const STORAGE_STUDENTS = 'tez_students_final_v2';
const STORAGE_RUBRICS = 'tez_rubrics_final_v2';
const IMAGE_DB_NAME = 'tez_analiz_images_db';
const IMAGE_STORE_NAME = 'student_images';

const tabDefs = [
  ['tab-data','1. Veri Girişi'],
  ['tab-artworks','2. Eser Dağılımı'],
  ['tab-tools','3. YZ Araçları'],
  ['tab-vize','4. Vize Prompt'],
  ['tab-final','5. Final Prompt'],
  ['tab-compare','6. Vize–Final'],
  ['tab-rubric','7. Rubrik'],
  ['tab-findings','8. Bulgular']
];

let students = [];
let rubrics = {};
let editingId = null;
let charts = {};

function stripImagesFromStudent(student){
  return {
    ...student,
    vize:{...student.vize, images:{past:'',present:'',future:''}},
    final:{...student.final, images:{past:'',present:'',future:''}}
  };
}
function getStudentImages(student){
  return {
    vize:{...(student?.vize?.images || {past:'',present:'',future:''})},
    final:{...(student?.final?.images || {past:'',present:'',future:''})}
  };
}
function applyImagesToStudent(student, images){
  return {
    ...student,
    vize:{...student.vize, images:{past:'',present:'',future:'', ...(images?.vize||{})}},
    final:{...student.final, images:{past:'',present:'',future:'', ...(images?.final||{})}}
  };
}
function openImageDB(){
  return new Promise((resolve, reject)=>{
    if(!window.indexedDB){ reject(new Error('IndexedDB desteklenmiyor.')); return; }
    const req = indexedDB.open(IMAGE_DB_NAME, 1);
    req.onupgradeneeded = ()=>{
      const db = req.result;
      if(!db.objectStoreNames.contains(IMAGE_STORE_NAME)) db.createObjectStore(IMAGE_STORE_NAME);
    };
    req.onsuccess = ()=>resolve(req.result);
    req.onerror = ()=>reject(req.error || new Error('Veritabanı açılamadı.'));
  });
}
async function idbSet(key, value){
  const db = await openImageDB();
  return new Promise((resolve, reject)=>{
    const tx = db.transaction(IMAGE_STORE_NAME, 'readwrite');
    tx.objectStore(IMAGE_STORE_NAME).put(value, key);
    tx.oncomplete = ()=>{ db.close(); resolve(true); };
    tx.onerror = ()=>{ db.close(); reject(tx.error || new Error('Görsel kaydedilemedi.')); };
  });
}
async function idbGet(key){
  const db = await openImageDB();
  return new Promise((resolve, reject)=>{
    const tx = db.transaction(IMAGE_STORE_NAME, 'readonly');
    const req = tx.objectStore(IMAGE_STORE_NAME).get(key);
    req.onsuccess = ()=>{ db.close(); resolve(req.result || null); };
    req.onerror = ()=>{ db.close(); reject(req.error || new Error('Görsel okunamadı.')); };
  });
}
async function idbDelete(key){
  const db = await openImageDB();
  return new Promise((resolve, reject)=>{
    const tx = db.transaction(IMAGE_STORE_NAME, 'readwrite');
    tx.objectStore(IMAGE_STORE_NAME).delete(key);
    tx.oncomplete = ()=>{ db.close(); resolve(true); };
    tx.onerror = ()=>{ db.close(); reject(tx.error || new Error('Görsel silinemedi.')); };
  });
}
async function saveStudents(){
  const safeStudents = students.map(stripImagesFromStudent);
  localStorage.setItem(STORAGE_STUDENTS, JSON.stringify(safeStudents));
  await Promise.all(students.map(s => idbSet(s.id, getStudentImages(s))));
}
async function loadStudents(){
  try{
    const meta = JSON.parse(localStorage.getItem(STORAGE_STUDENTS) || '[]');
    const hydrated = [];
    for(const student of meta){
      const images = await idbGet(student.id).catch(()=>null);
      hydrated.push(applyImagesToStudent(student, images));
    }
    students = hydrated;
  }catch(e){
    console.error(e);
    students = [];
  }
}
function saveRubrics(){ localStorage.setItem(STORAGE_RUBRICS, JSON.stringify(rubrics)); }
function loadRubrics(){ try{ rubrics = JSON.parse(localStorage.getItem(STORAGE_RUBRICS) || '{}'); }catch(e){ rubrics = {}; } }

function destroyCharts(){ Object.values(charts).forEach(c=>{ try{ c.destroy(); }catch(e){} }); charts = {}; }

function buildTabs(){
  const nav = document.getElementById('tabs');
  nav.innerHTML = tabDefs.map(([id,label],i)=>`<button class="${i===0?'active':''}" data-tab="${id}" onclick="showTab('${id}')">${label}</button>`).join('');
}
function showTab(id){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.querySelectorAll('#tabs button').forEach(b=>b.classList.toggle('active', b.dataset.tab===id));
  renderVisible(id);
}
function renderVisible(id){
  destroyCharts();
  if(id==='tab-artworks') renderArtworks();
  if(id==='tab-tools') renderTools();
  if(id==='tab-vize') renderPromptSection('vize');
  if(id==='tab-final') renderPromptSection('final');
  if(id==='tab-compare') renderCompare();
  if(id==='tab-rubric') renderRubric();
  if(id==='tab-findings') renderFindings();
}

function ensureRubric(id){
  if(!rubrics[id]){
    rubrics[id] = {
      vize:{conceptual:'',prompt:'',temporal:'',ai:'',creativity:''},
      final:{conceptual:'',prompt:'',temporal:'',ai:'',creativity:''}
    };
  }
}

function avgRubric(obj){
  const arr = [obj.conceptual,obj.prompt,obj.temporal,obj.ai,obj.creativity].map(Number).filter(v=>v>0);
  return arr.length ? +(arr.reduce((a,b)=>a+b,0)/arr.length).toFixed(2) : 0;
}

function fileToDataURL(file){
  return new Promise(resolve=>{
    if(!file){ resolve(''); return; }
    const r = new FileReader();
    r.onload = ()=>resolve(r.result);
    r.onerror = ()=>resolve('');
    r.readAsDataURL(file);
  });
}
function compressImageDataURL(dataURL, maxSize=1600, quality=0.82){
  return new Promise(resolve=>{
    const img = new Image();
    img.onload = ()=>{
      const ratio = Math.min(1, maxSize / Math.max(img.width, img.height));
      const canvas = document.createElement('canvas');
      canvas.width = Math.max(1, Math.round(img.width * ratio));
      canvas.height = Math.max(1, Math.round(img.height * ratio));
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
      resolve(canvas.toDataURL('image/jpeg', quality));
    };
    img.onerror = ()=>resolve(dataURL);
    img.src = dataURL;
  });
}
async function fileToStoredImage(file){
  const dataUrl = await fileToDataURL(file);
  if(!dataUrl) return '';
  return await compressImageDataURL(dataUrl);
}

function collectChecked(selector){ return [...document.querySelectorAll(selector+':checked')].map(x=>x.value); }
function setChecked(selector, vals){
  document.querySelectorAll(selector).forEach(ch=>ch.checked = (vals||[]).includes(ch.value));
}
function normalizeTools(baseVals, otherVal){
  const vals = [...(baseVals||[])];
  const i = vals.indexOf('Diğer');
  if(i>=0){
    vals.splice(i,1);
    if((otherVal||'').trim()) vals.push('Diğer: ' + otherVal.trim());
  }
  return vals;
}
function extractOther(values){
  const f = (values||[]).find(v=>String(v).startsWith('Diğer: '));
  return f ? String(f).replace(/^Diğer:\s*/, '') : '';
}
function toggleOtherFields(){
  const textOther = document.querySelector('.tool-text[value="Diğer"]')?.checked;
  const imgOther = document.querySelector('.tool-image[value="Diğer"]')?.checked;
  const t = document.getElementById('otherTextWrap');
  const i = document.getElementById('otherImageWrap');
  if(t) t.style.display = textOther ? 'block' : 'none';
  if(i) i.style.display = imgOther ? 'block' : 'none';
}

const stopWords = new Set(['ve','ile','bir','bu','için','the','and','for','with','from','that','this','çok','gibi','daha','olarak']);
const timeLex = {
  past:['geçmiş','tarihsel','eski','nostaljik','antik','historical','past','traditional','vintage','aged'],
  present:['günümüz','çağdaş','modern','güncel','kent','present','contemporary','urban','current','realistic'],
  future:['gelecek','ütopik','spekülatif','dijital','otonom','future','utopian','speculative','futuristic','smart']
};
const narrativeLex = ['atmosfer','ışık','gölge','malzeme','beton','cam','ahşap','hikaye','duygu','anlatı','mood','light','shadow','material','concrete','glass','wood','story','emotion'];
function tokenize(text){
  return (text||'').toLowerCase().replace(/[^\p{L}\p{N}\s]/gu,' ').split(/\s+/).filter(x => x && x.length>2 && !stopWords.has(x));
}
function promptMetrics(text, phaseKey){
  const tokens = tokenize(text);
  const unique = [...new Set(tokens)];
  const temporalHits = unique.filter(x=>timeLex[phaseKey].includes(x)).length;
  const narrativeHits = unique.filter(x=>narrativeLex.includes(x)).length;
  const conceptualVariety = Math.min(5, +(unique.length/4).toFixed(2));
  const temporalSuitability = Math.min(5, +(temporalHits*1.5 + (temporalHits?0.5:0)).toFixed(2));
  const narrativeVariety = Math.min(5, +(narrativeHits*1.2 + Math.min(tokens.length/14,1.5)).toFixed(2));
  const quality = +((conceptualVariety*0.4 + temporalSuitability*0.35 + narrativeVariety*0.25)).toFixed(2);
  return {tokens, uniqueCount:unique.length, wordCount:tokens.length, conceptualVariety, temporalSuitability, narrativeVariety, quality};
}
function analyzeSet(setObj){
  const past = promptMetrics(setObj.past,'past');
  const present = promptMetrics(setObj.present,'present');
  const future = promptMetrics(setObj.future,'future');
  const temporalDifferentiation = +(((Math.abs(past.quality-present.quality)+Math.abs(past.quality-future.quality)+Math.abs(present.quality-future.quality))/3)).toFixed(2);
  return {
    past,present,future,
    avgQuality:+((past.quality+present.quality+future.quality)/3).toFixed(2),
    avgWords:+((past.wordCount+present.wordCount+future.wordCount)/3).toFixed(1),
    avgUnique:+((past.uniqueCount+present.uniqueCount+future.uniqueCount)/3).toFixed(1),
    temporalDifferentiation
  };
}
function topKeywords(text, n=5){
  const freq = {};
  tokenize(text).forEach(t=>freq[t]=(freq[t]||0)+1);
  return Object.entries(freq).sort((a,b)=>b[1]-a[1]).slice(0,n).map(x=>x[0]);
}
function renderImage(src){
  return src ? `<img src="${src}" alt="">` : `<div class="small">Görsel yok</div>`;
}

function renderDataTab(){
  const el = document.getElementById('tab-data');
  el.innerHTML = `
  <div class="grid g2">
    <div class="card">
      <h2>Öğrenci Verisi Girişi</h2>
      <p class="sub">Öğrenci bilgileri, kullanılan yapay zekâ araçları, vize/final promptları ve görseller</p><div class="notice" style="margin-bottom:12px">Sistem güncellendi: uzun promptlar ve görseller artık tarayıcı kotasına takılmadan ayrı depolamada saklanır. Görseller yüklenirken otomatik optimize edilir.</div>

      <label>Öğrenci Kodu</label>
      <input id="studentId" placeholder="Ö-01">

      <div class="row">
        <div>
          <label>Seçilen Eser</label>
          <input id="artworkName" placeholder="Örn. Howl's Moving Castle">
        </div>
        <div>
          <label>Eser Türü</label>
          <select id="artworkType">
            <option value="film">Film</option>
            <option value="kitap">Kitap / Roman</option>
            <option value="sanat">Görsel Sanat</option>
            <option value="muzik">Müzik</option>
            <option value="diger">Diğer</option>
          </select>
        </div>
      </div>

      <hr class="sep">
      <div class="row">
        <div>
          <label>Prompt / Metin Desteği</label>
          ${['ChatGPT','Claude','Gemini','Diğer'].map(x=>`<label style="display:block"><input type="checkbox" class="tool-text" value="${x}" onchange="toggleOtherFields()"> ${x}</label>`).join('')}
          <div id="otherTextWrap" style="display:none">
            <label>Diğer Prompt / Metin Aracı</label>
            <input id="otherTextTool" placeholder="Araç adı">
          </div>
        </div>
        <div>
          <label>Görsel Üretim</label>
          ${['Midjourney','Adobe Firefly','DALL·E','Stable Diffusion','Leonardo AI','Diğer'].map(x=>`<label style="display:block"><input type="checkbox" class="tool-image" value="${x}" onchange="toggleOtherFields()"> ${x}</label>`).join('')}
          <div id="otherImageWrap" style="display:none">
            <label>Diğer Görsel Üretim Aracı</label>
            <input id="otherImageTool" placeholder="Araç adı">
          </div>
        </div>
      </div>

      <hr class="sep">
      <h3>Vize Promptları</h3>
      <div class="row3">
        <div>
          <label>Geçmiş Promptu</label><textarea id="vPast"></textarea>
          <label>Geçmiş Görseli</label><input type="file" id="vPastImg" accept="image/*">
        </div>
        <div>
          <label>Günümüz Promptu</label><textarea id="vPresent"></textarea>
          <label>Günümüz Görseli</label><input type="file" id="vPresentImg" accept="image/*">
        </div>
        <div>
          <label>Gelecek Promptu</label><textarea id="vFuture"></textarea>
          <label>Gelecek Görseli</label><input type="file" id="vFutureImg" accept="image/*">
        </div>
      </div>

      <hr class="sep">
      <h3>Final Promptları</h3>
      <div class="row3">
        <div>
          <label>Geçmiş Promptu</label><textarea id="fPast"></textarea>
          <label>Geçmiş Görseli</label><input type="file" id="fPastImg" accept="image/*">
        </div>
        <div>
          <label>Günümüz Promptu</label><textarea id="fPresent"></textarea>
          <label>Günümüz Görseli</label><input type="file" id="fPresentImg" accept="image/*">
        </div>
        <div>
          <label>Gelecek Promptu</label><textarea id="fFuture"></textarea>
          <label>Gelecek Görseli</label><input type="file" id="fFutureImg" accept="image/*">
        </div>
      </div>

      <div class="actions">
        <button class="btn" onclick="addOrUpdateStudent()">${editingId ? 'Güncelle' : 'Öğrenci Ekle'}</button>
        <button class="btn secondary" onclick="loadSampleData()">Örnek Veri Yükle</button>
        <button class="btn ghost" onclick="clearForm()">Formu Temizle</button>
        <button class="btn warn" onclick="clearAllData()">Tümünü Sil</button>
      </div>
    </div>

    <div class="card">
      <h2>Kayıtlı Öğrenciler</h2>
      <p class="sub">Toplam ${students.length} öğrenci</p>
      ${students.length ? `
      <div class="table-wrap"><table>
        <thead><tr><th>Kod</th><th>Eser</th><th>Tür</th><th>YZ Araçları</th><th>Görsel</th><th>İşlem</th></tr></thead>
        <tbody>
          ${students.map(s=>{
            const tools = [...(s.tools.text||[]), ...(s.tools.image||[])];
            const imgCount = Object.values(s.vize.images).filter(Boolean).length + Object.values(s.final.images).filter(Boolean).length;
            return `<tr>
              <td>${s.id}</td>
              <td>${s.artworkName}</td>
              <td>${s.artworkType}</td>
              <td>${tools.map(t=>`<span class="badge">${t}</span>`).join('')}</td>
              <td>${imgCount}/6</td>
              <td>
                <button class="btn ghost" onclick="editStudent('${s.id}')">Düzenle</button>
                <button class="btn warn" onclick="deleteStudent('${s.id}')">Sil</button>
              </td>
            </tr>`;
          }).join('')}
        </tbody>
      </table></div>` : `<div class="empty">Henüz öğrenci eklenmedi.</div>`}
    </div>
  </div>`;
  if(editingId) fillForm(editingId);
  setTimeout(toggleOtherFields, 0);
}
function clearForm(){
  editingId = null;
  ['studentId','artworkName','vPast','vPresent','vFuture','fPast','fPresent','fFuture','otherTextTool','otherImageTool'].forEach(id=>{
    const x = document.getElementById(id); if(x) x.value='';
  });
  ['vPastImg','vPresentImg','vFutureImg','fPastImg','fPresentImg','fFutureImg'].forEach(id=>{
    const x = document.getElementById(id); if(x) x.value='';
  });
  const t = document.getElementById('artworkType'); if(t) t.value = 'film';
  document.querySelectorAll('.tool-text,.tool-image').forEach(ch=>ch.checked=false);
  renderDataTab();
}
function editStudent(id){ editingId = id; renderDataTab(); }
function fillForm(id){
  const s = students.find(x=>x.id===id); if(!s) return;
  setTimeout(()=>{
    document.getElementById('studentId').value = s.id || '';
    document.getElementById('artworkName').value = s.artworkName || '';
    document.getElementById('artworkType').value = s.artworkType || 'film';
    document.getElementById('vPast').value = s.vize.past || '';
    document.getElementById('vPresent').value = s.vize.present || '';
    document.getElementById('vFuture').value = s.vize.future || '';
    document.getElementById('fPast').value = s.final.past || '';
    document.getElementById('fPresent').value = s.final.present || '';
    document.getElementById('fFuture').value = s.final.future || '';

    const textVals = (s.tools.text||[]).map(v => String(v).startsWith('Diğer: ') ? 'Diğer' : v);
    const imgVals = (s.tools.image||[]).map(v => String(v).startsWith('Diğer: ') ? 'Diğer' : v);
    setChecked('.tool-text', textVals);
    setChecked('.tool-image', imgVals);
    document.getElementById('otherTextTool').value = extractOther(s.tools.text||[]);
    document.getElementById('otherImageTool').value = extractOther(s.tools.image||[]);
    toggleOtherFields();
  },0);
}
async function addOrUpdateStudent(){
  const id = document.getElementById('studentId').value.trim();
  if(!id){ alert('Öğrenci kodu gerekli.'); return; }

  const existing = students.find(s => s.id === editingId) || students.find(s => s.id === id);
  const obj = {
    id,
    artworkName: document.getElementById('artworkName').value.trim(),
    artworkType: document.getElementById('artworkType').value,
    tools:{
      text: normalizeTools(collectChecked('.tool-text'), document.getElementById('otherTextTool').value),
      image: normalizeTools(collectChecked('.tool-image'), document.getElementById('otherImageTool').value),
    },
    vize:{
      past: document.getElementById('vPast').value.trim(),
      present: document.getElementById('vPresent').value.trim(),
      future: document.getElementById('vFuture').value.trim(),
      images:{
        past: existing?.vize?.images?.past || '',
        present: existing?.vize?.images?.present || '',
        future: existing?.vize?.images?.future || ''
      }
    },
    final:{
      past: document.getElementById('fPast').value.trim(),
      present: document.getElementById('fPresent').value.trim(),
      future: document.getElementById('fFuture').value.trim(),
      images:{
        past: existing?.final?.images?.past || '',
        present: existing?.final?.images?.present || '',
        future: existing?.final?.images?.future || ''
      }
    }
  };

  const files = [
    ['vize','past','vPastImg'],['vize','present','vPresentImg'],['vize','future','vFutureImg'],
    ['final','past','fPastImg'],['final','present','fPresentImg'],['final','future','fFutureImg']
  ];
  for(const [phase,key,inputId] of files){
    const file = document.getElementById(inputId).files[0];
    if(file) obj[phase].images[key] = await fileToStoredImage(file);
  }

  const idx = students.findIndex(s => s.id === editingId || s.id === id);
  if(idx >= 0){
    const oldId = students[idx].id;
    students[idx] = obj;
    if(oldId !== id && rubrics[oldId]){
      rubrics[id] = rubrics[oldId];
      delete rubrics[oldId];
    }
  } else students.push(obj);

  ensureRubric(id);
  try{
    await saveStudents();
    saveRubrics();
    editingId = null;
    renderAll();
  }catch(err){
    console.error(err);
    alert('Kayıt sırasında depolama hatası oluştu. Tarayıcı depolama izinlerini kontrol edin.');
  }
}

async function deleteStudent(id){
  students = students.filter(s=>s.id !== id);
  delete rubrics[id];
  await idbDelete(id).catch(()=>null);
  await saveStudents();
  saveRubrics();
  if(editingId===id) editingId = null;
  renderAll();
}
async function clearAllData(){
  if(!confirm('Tüm veriler silinsin mi?')) return;
  const ids = students.map(s=>s.id);
  students = []; rubrics = {}; editingId = null;
  await Promise.all(ids.map(id=>idbDelete(id).catch(()=>null)));
  await saveStudents();
  saveRubrics();
  renderAll();
}

  const ranking = students.map(s=>({id:s.id, avg:avgRubric((rubrics[s.id]||{}).final)})).sort((a,b)=>b.avg-a.avg);
  el.innerHTML = `
    <div class="notice">Aşağıdaki metinler veri temelli taslak yorumlardır. Tez metnine aktarılmadan önce araştırmacı tarafından yeniden yazılmalıdır.</div>
    <div class="card">
      <div class="finding"><strong>Prompt gelişimi:</strong> Öğrencilerin final aşamasında ürettikleri promptların ortalama niteliği ${vQ} düzeyinden ${fQ} düzeyine yükselmiştir. Bu bulgu, kavramsal çeşitlilik ve zamansal uygunluk bakımından gelişim olduğunu göstermektedir.</div>
      <div class="finding"><strong>Zamansal ayrışma:</strong> Vize aşamasında ortalama zamansal ayrışma ${vT}, final aşamasında ise ${fT} olarak hesaplanmıştır. Bu durum, geçmiş, günümüz ve gelecek kurgularının finalde daha belirgin biçimde ayrıştığını düşündürmektedir.</div>
      <div class="finding"><strong>Rubrik sonucu:</strong> Final rubrik değerlendirmesine göre en yüksek ortalamaya sahip öğrenci <strong>${ranking[0]?.id || '-'}</strong> olmuştur. Bu sıralama yalnızca final ürün üzerinden oluşturulmuştur.</div>
      <div class="finding"><strong>Yöntemsel çerçeve:</strong> Sistem, yaratıcılığı mutlak olarak ölçen bir araç değil; kavramsal gelişim, istem niteliği, zamansal ayrışma ve görsel üretim ilişkisini görünür kılan çok boyutlu bir değerlendirme çerçevesidir.</div>
    </div>
  `;
}

function renderAll(){
  renderDataTab();
  const active = document.querySelector('.tab.active')?.id || 'tab-data';
  renderVisible(active);
}

async function initApp(){
  buildTabs();
  await loadStudents();
  loadRubrics();
  renderAll();
}
initApp();
window.addEventListener('resize', ()=> {
  const active = document.querySelector('.tab.active')?.id;
  if(active) setTimeout(()=>renderVisible(active), 120);
});
</script>
</body>
</html>
